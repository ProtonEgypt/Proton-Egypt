<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { initializeAppCheck, ReCaptchaV3Provider }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js";

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#x27;');
}

const firebaseConfig = {
  apiKey:"AIzaSyAxc-i2-VmE14fhFCdf-vGi2GaRzg1VqoQ",
  authDomain:"proton-egypt-official.firebaseapp.com",
  projectId:"proton-egypt-official",
  storageBucket:"proton-egypt-official.firebasestorage.app",
  messagingSenderId:"1067061157926",
  appId:"1:1067061157926:web:e2e913b738c717ab6686e7"
};
const app = initializeApp(firebaseConfig);
try {
  initializeAppCheck(app, {
    provider: new ReCaptchaV3Provider('6Ld1CqIsAAAAALxg554hle-iT6mYelmeVGc9iue3'),
    isTokenAutoRefreshEnabled: true
  });
} catch(e) {}
const db  = getFirestore(app);
var _authPromise = (async function(){
  try{
    const _auth = getAuth(app);
    await signInAnonymously(_auth);
    setInterval(async()=>{ try{ await _auth.currentUser?.getIdToken(true); }catch(e){} }, 50*60*1000);
  }catch(e){}
})();

const _vAttempts = { count: 0, firstAt: Date.now() };
function checkVerifyRate() {
  const now = Date.now(), WIN = 60000, MAX = 5;
  if (now - _vAttempts.firstAt > WIN) { _vAttempts.count = 0; _vAttempts.firstAt = now; }
  if (_vAttempts.count >= MAX) return false;
  _vAttempts.count++;
  return true;
}

async function verifyMember(memberId) {
  if (!checkVerifyRate()) {
    showError('تم تجاوز الحد الأقصى للطلبات. يرجى الانتظار دقيقة والمحاولة مجدداً.');
    return;
  }
  const cleanId = String(memberId).replace(/[^A-Za-z0-9-]/g, '').substring(0, 20);
  if (!cleanId) { showError('رقم العضوية غير صحيح'); return; }
  try {
    const snap = await getDocs(collection(db, 'members'));
    let found = null;
    snap.forEach(d => {
      const data = d.data();
      if (data.id === cleanId && data.status !== 'pending') found = data;
    });
    showResult(cleanId, found);
  } catch(e) {
    showError('حدث خطأ في الاتصال بقاعدة البيانات');
  }
}

function showResult(memberId, member) {
  document.getElementById('loading-section').style.display = 'none';

  if (!member) {
    document.getElementById('not-found-section').style.display = 'block';
    document.getElementById('nf-id').textContent = memberId;
    return;
  }

  const statusConfig = {
    active: { label: 'عضوية نشطة ✓', color: '#00C864', bg: 'rgba(0,200,100,0.08)', border: 'rgba(0,200,100,0.3)', icon: '✅' },
    frozen: { label: 'عضوية مجمّدة ❄️', color: '#64B4FF', bg: 'rgba(100,180,255,0.08)', border: 'rgba(100,180,255,0.3)', icon: '❄️' },
    cancelled: { label: 'عضوية ملغاة ✕', color: '#FF6B6B', bg: 'rgba(220,50,50,0.08)', border: 'rgba(220,50,50,0.3)', icon: '❌' },
  };
  const cfg = statusConfig[member.status] || statusConfig['cancelled'];

  const card = document.getElementById('result-section');
  card.style.display = 'block';

  document.getElementById('status-bar').style.background = cfg.bg;
  document.getElementById('status-bar').style.borderColor = cfg.border;
  document.getElementById('status-icon').textContent = cfg.icon;
  document.getElementById('status-label').textContent = cfg.label;
  document.getElementById('status-label').style.color = cfg.color;

  document.getElementById('res-name').textContent  = esc(member.name)  || '—';
  document.getElementById('res-id').textContent    = esc(member.id)    || '—';
  document.getElementById('res-model').textContent = esc(member.model) || '—';
  document.getElementById('res-year').textContent  = esc(member.year)  || '—';
  document.getElementById('res-plate').textContent = esc(member.plate) || '—';
  document.getElementById('res-date').textContent  = esc(member.date)  || '—';

  const av = document.getElementById('res-avatar');
  if (member.licenseData && /^data:image\/(jpeg|jpg|png|webp);base64,/.test(member.licenseData)) {
    av.innerHTML = `<img src="${member.licenseData}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  } else {
    av.textContent = '👤';
  }

  document.getElementById('verify-time').textContent = new Date().toLocaleString('ar-EG');
}

function showError(msg) {
  document.getElementById('loading-section').style.display = 'none';
  document.getElementById('error-section').style.display = 'block';
  document.getElementById('error-msg').textContent = msg;
}

// استخراج المعرف من URL
window.addEventListener('load', async () => {
  const params = new URLSearchParams(window.location.search);
  let memberId = params.get('id') || params.get('member');

  if (!memberId && window.location.hash) {
    memberId = window.location.hash.replace('#', '');
  }

  if (!memberId) {
    document.getElementById('loading-section').style.display = 'none';
    document.getElementById('manual-section').style.display = 'block';
    return;
  }

  memberId = memberId.replace('PROTON-EGYPT:', '').replace('PROTON-EGYPT-OFFICIAL:', '');
  await _authPromise;
  verifyMember(memberId);
});

window.manualVerify = function() {
  const raw = document.getElementById('manual-input').value.trim().toUpperCase();
  const id = raw.replace(/[^A-Z0-9-]/g, '').substring(0, 20);
  if (!id) return;
  document.getElementById('manual-section').style.display = 'none';
  document.getElementById('loading-section').style.display = 'flex';
  verifyMember(id);
};
</script>
